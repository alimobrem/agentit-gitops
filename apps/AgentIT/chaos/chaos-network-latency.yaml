apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: agentit-network-latency
  namespace: default
  labels:
    app.kubernetes.io/name: agentit
spec:
  appinfo:
    appns: default
    applabel: app=agentit
    appkind: deployment
  engineState: active
  chaosServiceAccount: agentit-chaos-sa
  experiments:
  - name: pod-network-latency
    spec:
      components:
        env:
        - name: TOTAL_CHAOS_DURATION
          value: '60'
        - name: NETWORK_LATENCY
          value: '500'
        - name: NETWORK_INTERFACE
          value: eth0
      probe:
      - name: check-app-responsive
        type: httpProbe
        mode: Continuous
        httpProbe/inputs:
          url: http://agentit.default.svc:8080/healthz
          method:
            get:
              criteria: ==
              responseCode: '200'
        runProperties:
          probeTimeout: 5s
          retry: 3
          interval: 10s
