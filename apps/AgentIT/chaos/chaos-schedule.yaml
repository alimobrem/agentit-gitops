apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: agentit-chaos-schedule
  labels:
    app.kubernetes.io/name: agentit
spec:
  schedule: 0 2 * * 3
  timezone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: chaos-run
    serviceAccountName: agentit-chaos-sa
    templates:
    - name: chaos-run
      container:
        image: litmuschaos/litmus-checker:latest
        args:
        - --chaosengine
        - agentit-pod-kill
        - --namespace
        - default
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
