apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentit-deny-all
  namespace: default
  labels:
    app.kubernetes.io/name: agentit
spec:
  podSelector:
    matchLabels:
      app: agentit
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentit-allow-common
  namespace: default
  labels:
    app.kubernetes.io/name: agentit
spec:
  podSelector:
    matchLabels:
      app: agentit
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
