apiVersion: v1
kind: Pod
metadata:
  name: agentit-security-context-patch
  namespace: default
  labels:
    app.kubernetes.io/name: agentit
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: agentit
    image: PLACEHOLDER
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
