apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentit
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/org/agentit.git"
    targetRevision: HEAD
    path: deploy/
  destination:
    server: https://kubernetes.default.svc
    namespace: agentit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m