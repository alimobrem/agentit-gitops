apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: agentit-dependency-scan
  labels:
    app.kubernetes.io/name: agentit
spec:
  schedule: 0 5 * * 1
  timezone: UTC
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: dep-scan
    templates:
    - name: dep-scan
      container:
        image: REPLACE_WITH_AGENTIT_IMAGE
        command:
        - agentit
        args:
        - assess
        - --rescan
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
