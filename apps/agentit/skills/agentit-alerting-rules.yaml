apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agentit-alerts
  labels:
    app.kubernetes.io/name: agentit
spec:
  groups:
    - name: agentit.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{app="agentit",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{app="agentit"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Error rate above 5% for agentit"
        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{app="agentit"}[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency above 1s for agentit"
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{pod=~"agentit.*"}[10m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping for agentit"