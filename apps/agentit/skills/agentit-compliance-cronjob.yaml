apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-compliance-sa
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: compliance-rescan
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-compliance-reader
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: compliance-rescan
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - endpoints
      - namespaces
      - resourcequotas
      - limitranges
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-compliance-reader
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: compliance-rescan
subjects:
  - kind: ServiceAccount
    name: agentit-compliance-sa
    namespace: agentit
roleRef:
  kind: Role
  name: agentit-compliance-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-compliance-rescan
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: compliance-rescan
    app.kubernetes.io/part-of: agentit
    app.kubernetes.io/managed-by: platform-engineering
spec:
  schedule: "0 2 1 * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: compliance-rescan
        spec:
          serviceAccountName: agentit-compliance-sa
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: assess
              image: agentit:latest
              command: ["agentit", "assess"]
              args:
                - "--namespace"
                - "agentit"
                - "--output"
                - "/results/report.json"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              volumeMounts:
                - name: results
                  mountPath: /results
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: results
              emptyDir: {}
            - name: tmp
              emptyDir: {}
          automountServiceAccountToken: true