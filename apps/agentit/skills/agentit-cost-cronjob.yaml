apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-cost-reporter
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: cost-reporting
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentit-cost-reporter
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: cost-reporting
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "resourcequotas", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentit-cost-reporter
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: cost-reporting
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentit-cost-reporter
subjects:
  - kind: ServiceAccount
    name: agentit-cost-reporter
    namespace: default
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-cost-report
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: cost-reporting
    app.kubernetes.io/part-of: agentit
    app.kubernetes.io/managed-by: kubectl
    criticality: high
spec:
  schedule: "0 8 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: cost-reporting
        spec:
          restartPolicy: OnFailure
          serviceAccountName: agentit-cost-reporter
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cost-report
              image: python:3.12-slim
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: REPORT_FORMAT
                  value: "json"
                - name: APP_NAME
                  value: "agentit"
                - name: REPORT_OUTPUT_DIR
                  value: "/reports"
              volumeMounts:
                - name: reports
                  mountPath: /reports
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: reports
              emptyDir: {}
            - name: tmp
              emptyDir: {}