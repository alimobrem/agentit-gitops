apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
subjects:
  - kind: ServiceAccount
    name: agentit-scanner
roleRef:
  kind: Role
  name: agentit-scanner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-dependency-scan
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
    app.kubernetes.io/part-of: agentit
    app.kubernetes.io/managed-by: platform-engineering
    criticality: high
spec:
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: dependency-scanning
        spec:
          restartPolicy: OnFailure
          serviceAccountName: agentit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: dependency-scan
              image: "aquasec/trivy:latest"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: SCAN_SCOPE
                  value: "images,packages"
                - name: SEVERITY_THRESHOLD
                  value: "HIGH"
                - name: APP_NAME
                  value: "agentit"
                - name: STACK
                  value: "python"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: cache
                  mountPath: /.cache
          volumes:
            - name: tmp
              emptyDir: {}
            - name: cache
              emptyDir: {}