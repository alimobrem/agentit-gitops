apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentit
  labels:
    app.kubernetes.io/name: agentit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentit
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80