apiVersion: v1
kind: LimitRange
metadata:
  name: agentit-limits
  labels:
    app.kubernetes.io/name: agentit
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi