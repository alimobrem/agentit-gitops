apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hello-world-alerts
  labels:
    app.kubernetes.io/name: hello-world
spec:
  groups:
    - name: hello-world.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{app="hello-world",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{app="hello-world"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Error rate above 5% for hello-world"
        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{app="hello-world"}[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency above 1s for hello-world"
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{pod=~"hello-world.*"}[10m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping for hello-world"