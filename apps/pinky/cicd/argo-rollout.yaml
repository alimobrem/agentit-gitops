apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pinky
  labels:
    app.kubernetes.io/name: pinky
  annotations:
    agentit.io/image-note: "ImageStream agentit/pinky:latest = ubi9/httpd-24 for dogfood Rollout"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pinky
  strategy:
    canary:
      steps:
      - setWeight: 100
      canaryService: pinky-canary
      stableService: pinky
  template:
    metadata:
      labels:
        app: pinky
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pinky
        image: image-registry.openshift-image-registry.svc:5000/agentit/pinky:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pinky
  labels:
    app.kubernetes.io/name: pinky
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: pinky
---
apiVersion: v1
kind: Service
metadata:
  name: pinky-canary
  labels:
    app.kubernetes.io/name: pinky
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: pinky
