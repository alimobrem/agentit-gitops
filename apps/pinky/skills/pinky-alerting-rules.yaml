apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pinky-alerts
  labels:
    app.kubernetes.io/name: pinky
spec:
  groups:
    - name: pinky.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{app="pinky",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{app="pinky"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Error rate above 5% for pinky"
        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{app="pinky"}[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency above 1s for pinky"
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{pod=~"pinky.*"}[10m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping for pinky"