apiVersion: batch/v1
kind: Job
metadata:
  name: pinky-data-archive
  labels:
    app.kubernetes.io/name: pinky
    app.kubernetes.io/component: data-archive
    app.kubernetes.io/part-of: pinky
    app.kubernetes.io/managed-by: kubernetes
    criticality: high
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky
        app.kubernetes.io/component: data-archive
        app.kubernetes.io/part-of: pinky
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: archive
          image: registry.access.redhat.com/rhel9/postgresql-15:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: pinky-db-credentials
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: pinky-db-credentials
                  key: port
                  optional: true
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: pinky-db-credentials
                  key: database
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: pinky-db-credentials
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pinky-db-credentials
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set