apiVersion: batch/v1
kind: Job
metadata:
  name: pinky-data-archive
  labels:
    app.kubernetes.io/name: pinky
    app.kubernetes.io/component: data-archive
    app.kubernetes.io/part-of: pinky
    app.kubernetes.io/managed-by: kubernetes
    criticality: high
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky
        app.kubernetes.io/component: data-archive
        app.kubernetes.io/part-of: pinky
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: archive
          # Match pinky-postgresql / temporal-db (registry.access.redhat.com
          # rhel9/postgresql-* requires terms acceptance → ImagePullBackOff).
          image: registry.redhat.io/rhel9/postgresql-16:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          # No secret env: pinky-db-credentials only has password/url keys, and
          # this dogfood Job is a no-op smoke (command below). Missing host/
          # database/username keys caused CreateContainerConfigError after the
          # image pull was fixed.
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "pinky-data-archive: image pull ok; no-op complete"
