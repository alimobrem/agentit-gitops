apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pinky-hpa
  labels:
    app.kubernetes.io/name: pinky
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: pinky
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
