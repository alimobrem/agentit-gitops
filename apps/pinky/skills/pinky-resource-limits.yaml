apiVersion: v1
kind: ResourceQuota
metadata:
  name: pinky-quota
  labels:
    app.kubernetes.io/name: pinky
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pinky-limits
  labels:
    app.kubernetes.io/name: pinky
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi